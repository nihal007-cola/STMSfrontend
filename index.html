<!DOCTYPE html>
<html>
<head>
  <title>ONNwork STMS</title>
</head>
<body>

<h1>STMS Test</h1>

<button onclick="sendData()">Send Data</button>

<pre id="output"></pre>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbxHsrB7H6c8c-t5kZ_pOomrsVyfokncRDsxgF8AT-ccbaJGNclmD4TSs5E0nbImkl8zeQ/exec";

async function sendData() {
  const res = await fetch(API_URL, {
    method: "POST",
    body: JSON.stringify({
      test: "hello from frontend"
    })
  });

  const data = await res.json();
  document.getElementById("output").innerText = JSON.stringify(data, null, 2);
}
</script>

</body>
</html>
